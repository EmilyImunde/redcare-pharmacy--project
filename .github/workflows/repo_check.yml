name: Repo Check

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  repo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List repository structure
        run: |
          echo "Repository Strucucture:"
          ls -R
          
          test -f README.md
          test -f databricks.yml
          test -f config/project_config.yml
          test -d docs
          test -d sample_data
          test -d notebooks
          test -d sql